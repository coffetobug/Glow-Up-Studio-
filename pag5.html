<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Up - Resultado</title>
    <link rel="stylesheet" href="style5.css">
</head>



<body>
<form action="https://formspree.io/f/mjglvyaj" method="POST" id="form-agenda">

    <h2 class="titulo-form">Agendamento Glow Up</h2>

<div class="form-group">
    <label for="nome">Nome</label>
    <input type="text" id="nome" placeholder="Digite seu nome" required>
</div>

<div class="form-group">
    <label for="data">Data Desejada</label>
    <input type="date" id="data" name="data" required>
</div>

<div class="form-group">
    <label for="hora-agendamento">Horário do Atendimento</label>
    <input type="time" id="hora-agendamento" name="hora" required>
</div>

<div class="form-group">
    <label for="contato">WhatsApp</label>
    <input type="tel" id="contato" name="contato" placeholder="(61) 99999-9999">
</div>

   <div class="botão">
<button type="submit" class="btn-enviar">Confirma Agendamento</button>
<input id="Limpar"  type="reset" name="Limpar" value="Limpar"> 
</div>
 </form>   
</body>
</html>
