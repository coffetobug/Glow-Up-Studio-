<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Up - Resultado</title>
    <link rel="stylesheet" href="style5.css">
</head>



<body>
<form action="https://formspree.io/f/mjglvyaj" method="POST" id="form-agenda">

    <h2 class="titulo-form">Agendamento Glow Up</h2>

    <div class="form-group">
        <label for="nome">Nome: </label>
        <!-- Adicionado name="Nome" -->
        <input type="text" id="nome" name="Nome" placeholder="Digite seu nome" required>
    </div>

    <div class="form-group">
        <label for="data">Data: </label>
        <!-- Já tem name="data" -->
        <input type="date" id="data" name="data" placeholder="00/00/0000" required>
    </div>

    <div class="form-group">
        <label for="hora-agendamento">Horário: </label>
        <!-- Já tem name="hora" -->
        <input type="time" id="hora-agendamento" name="hora"  placeholder="00:00" required>
    </div>

    <div class="form-group">
        <label for="contato">WhatsApp: </label>
        <!-- Adicionado name="WhatsApp" -->
        <input type="tel" id="contato" name="WhatsApp" placeholder="(61) 99999-9999">
    </div>

    <div class="botão">
        <!-- No seu pag5.html, mude o botão para isso: -->
<button type="submit" onclick="prepararEnvio()" class="btn-enviar">Confirma</button>
        <input id="Limpar" type="reset" name="Limpar" value="Limpar"> 
    </div>
</form>
</body>
</html>
